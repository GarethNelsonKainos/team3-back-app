version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: nialloneill
      POSTGRES_PASSWORD: conal9Sean
      POSTGRES_DB: mydb
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nialloneill"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://nialloneill:conal9Sean@db:5432/mydb?schema=backend"
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    restart: unless-stopped

volumes:
  db-data:
